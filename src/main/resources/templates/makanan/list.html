<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/layout :: head(title='Data Makanan')}"></head>
  <body>
    <div class="app-shell">
      <div th:replace="~{fragments/layout :: nav(active='makanan')}"></div>
      <div class="main-col">
        <div class="topbar d-lg-none">
          <div class="brand"><span class="dot"></span>Diet Planner</div>
          <a href="/logout" class="text-dark"
            ><i class="bi bi-box-arrow-right fs-5"></i
          ></a>
        </div>
        <div class="content-wrap">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
              <p class="page-title mb-0">Data Makanan</p>
              <p
                class="page-sub mb-0"
                th:text="${#lists.size(daftarMakanan)} + ' item makanan'"
              >
                0 item
              </p>
            </div>
            <a class="btn-brand btn" href="/makanan/tambah"
              ><i class="bi bi-plus-lg"></i> Tambah</a
            >
          </div>

          <div th:if="${daftarMakanan.isEmpty()}" class="empty-state card-soft">
            <i class="bi bi-egg-fried"></i> Belum ada data makanan.
          </div>

          <div th:each="m : ${daftarMakanan}" class="list-row">
            <div>
              <div class="d-flex align-items-center gap-2 mb-1">
                <span class="title" th:text="${m.nama}">Nama</span>
                <span class="badge-kategori" th:text="${m.kategori}"></span>
              </div>
              <div class="subtitle">
                <span th:text="${m.kalori} + ' kkal'"></span> · P
                <span th:text="${m.protein}"></span>g · K
                <span th:text="${m.karbohidrat}"></span>g · L
                <span th:text="${m.lemak}"></span>g
              </div>
              <div class="subtitle" th:if="${!#strings.isEmpty(m.alergen)}">
                Alergen: <span th:text="${m.alergen}"></span>
              </div>
            </div>
            <div class="d-flex gap-2">
              <a
                class="btn btn-outline-brand btn-sm"
                th:href="@{/makanan/edit/{id}(id=${m.id})}"
                ><i class="bi bi-pencil"></i
              ></a>
              <a
                class="btn btn-danger-soft"
                th:href="@{/makanan/hapus/{id}(id=${m.id})}"
                onclick="return confirm('Hapus makanan ini?');"
                ><i class="bi bi-trash3"></i
              ></a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
