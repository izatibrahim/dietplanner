<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/layout :: head(title='Profil')}"></head>
  <body>
    <div class="app-shell">
      <div th:replace="~{fragments/layout :: nav(active='user')}"></div>
      <div class="main-col">
        <div class="topbar d-lg-none">
          <div class="brand"><span class="dot"></span>Diet Planner</div>
          <a href="/logout" class="text-dark"
            ><i class="bi bi-box-arrow-right fs-5"></i
          ></a>
        </div>
        <div class="content-wrap">
          <p class="page-title mb-0">Profil</p>
          <p class="page-sub">
            Data diri yang dipakai untuk hitung BMI/BMR & rekomendasi menu
          </p>

          <div class="card-soft">
            <div class="d-flex align-items-center gap-3 mb-3">
              <div
                class="icon-badge"
                style="width: 56px; height: 56px; font-size: 1.5rem"
              >
                <i class="bi bi-person"></i>
              </div>
              <div>
                <div class="title fs-5" th:text="${user.nama}">Nama</div>
                <div class="subtitle" th:text="'@' + ${user.username}"></div>
              </div>
            </div>

            <div
              class="d-flex justify-content-between py-2 border-bottom"
              style="font-size: 0.9rem"
            >
              <span class="text-muted">Umur</span
              ><span th:text="${user.umur} + ' tahun'"></span>
            </div>
            <div
              class="d-flex justify-content-between py-2 border-bottom"
              style="font-size: 0.9rem"
            >
              <span class="text-muted">Jenis Kelamin</span
              ><span
                th:text="${user.jenisKelamin == 'L'} ? 'Laki-laki' : 'Perempuan'"
              ></span>
            </div>
            <div
              class="d-flex justify-content-between py-2 border-bottom"
              style="font-size: 0.9rem"
            >
              <span class="text-muted">Tinggi Badan</span
              ><span th:text="${user.tinggiBadan} + ' cm'"></span>
            </div>
            <div
              class="d-flex justify-content-between py-2 border-bottom"
              style="font-size: 0.9rem"
            >
              <span class="text-muted">Berat Badan</span
              ><span th:text="${user.beratBadan} + ' kg'"></span>
            </div>
            <div
              class="d-flex justify-content-between py-2 border-bottom"
              style="font-size: 0.9rem"
            >
              <span class="text-muted">Target</span
              ><span th:text="${user.target}"></span>
            </div>
            <div
              class="d-flex justify-content-between py-2"
              style="font-size: 0.9rem"
            >
              <span class="text-muted">Alergi</span>
              <span
                th:text="${#strings.isEmpty(user.alergi)} ? '-' : ${user.alergi}"
              ></span>
            </div>

            <div class="d-flex gap-2 mt-3">
              <a
                class="btn-brand btn flex-fill"
                th:href="@{/user/edit/{id}(id=${user.id})}"
              >
                <i class="bi bi-pencil"></i> Edit Profil
              </a>
              <a
                class="btn btn-outline-brand flex-fill text-center"
                href="/logout"
              >
                <i class="bi bi-arrow-repeat"></i> Ganti Akun
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
